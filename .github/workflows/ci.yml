name: JobOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: jobos
          POSTGRES_PASSWORD: jobos123
          POSTGRES_DB: jobos
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U jobos"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql+asyncpg://jobos:jobos123@localhost:5432/jobos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Apply database migrations
        run: |
          PGPASSWORD=jobos123 psql -h localhost -U jobos -d jobos -f backend/db/migrations/001_initial.sql

      - name: Seed database
        run: |
          cd backend
          python -m db.seed

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: |
          cd backend
          python -m pytest tests/ --cov=utils --cov=api --cov-report=term-missing
