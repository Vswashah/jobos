services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jobos
      POSTGRES_PASSWORD: jobos123
      POSTGRES_DB: jobos
    ports:
      - "5433:5432"
    volumes:
      - jobos_db_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobos"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://jobos:jobos123@db:5432/jobos
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    env_file:
      - path: ./backend/.env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - jobos_resumes:/tmp/jobos_resumes
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  jobos_db_data:
  jobos_resumes:
