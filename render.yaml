databases:
  - name: jobos-db
    plan: starter
    postgresMajorVersion: "16"

services:
  - type: web
    name: jobos-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobos-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://jobos-frontend.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_BUCKET_NAME
        sync: false
      - key: AWS_REGION
        value: us-east-1

  - type: web
    name: jobos-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE
        value: https://jobos-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
