services:
  - type: web
    name: jobos-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      # Set this manually in the Render dashboard to your Neon connection
      # string (see DEPLOY.md) — not a Render-managed database, so it can't
      # be wired via fromDatabase.
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://jobos-frontend-5de2.onrender.com
      - key: SECRET_KEY
        generateValue: true
      # GROQ_API_KEY, GEMINI_API_KEY, AWS_* aren't read by any code yet —
      # add them in the dashboard's Environment tab later if you wire up
      # those features. Declaring them here as sync:false would block
      # blueprint deploys until every one has a value.

  - type: web
    name: jobos-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE
        value: https://jobos-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
